apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: sno-storagecluster-ceph-rbd
provisioner: rbd.csi.ceph.com
parameters:
  clusterID: openshift-storage
  pool: sno-storagecluster-cephblockpool
  imageFeatures: layering
  csi.storage.k8s.io/provisioner-secret-name: rbd.csi.ceph.com-provisioner
  csi.storage.k8s.io/provisioner-secret-namespace: openshift-storage
  csi.storage.k8s.io/controller-expand-secret-name: rbd.csi.ceph.com-provisioner
  csi.storage.k8s.io/controller-expand-secret-namespace: openshift-storage
  csi.storage.k8s.io/node-stage-secret-name: rbd.csi.ceph.com-node
  csi.storage.k8s.io/node-stage-secret-namespace: openshift-storage
  csi.storage.k8s.io/fstype: ext4
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: Immediate